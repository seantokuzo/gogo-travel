# GoGo Travel CI — deterministic checks ONLY.
# Law #5 / ADR-003: no LLM, no metered API keys, no scheduled triggers.
# Reviews run in-session on Max (ADR-003) — this gate is lint/types/tests/build.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Expo export can be memory-hungry on runners
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # ===========================================================================
  # Guard — cheap structural policy checks (Law #5 tripwires; fail fast)
  # ===========================================================================
  guard:
    name: Guard (policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No scheduled/cron CI triggers
        run: |
          # ADR-003 cost guardrail: CI runs only on push / pull_request /
          # workflow_dispatch — never on a timer.
          # (Pattern is anchored to line-start keys so this guard's own
          # comments and grep string can't self-match.)
          if grep -rnE '^[[:space:]]*(schedule:|-[[:space:]]*cron:)' .github/workflows/; then
            echo "::error::Scheduled/cron CI trigger detected. Remove it (ADR-003)."
            exit 1
          fi
          echo "OK — no scheduled/cron triggers."

      - name: No metered API keys or LLM actions in CI
        run: |
          # Law #5: everything LLM runs in-session on Max. The forbidden tokens
          # are assembled from parts so this step never matches itself.
          KEY="ANTHROPIC_"
          KEY="${KEY}API_KEY"
          ACTION="claude-code-"
          ACTION="${ACTION}action"
          if grep -rn -e "$KEY" -e "$ACTION" .github/workflows/; then
            echo "::error::Metered API key or LLM action reference found in CI (Law #5 / ADR-003)."
            exit 1
          fi
          echo "OK — no metered API keys or LLM actions."

      - name: Aggregator unit tests
        # The verdict aggregator (.github/scripts/) sits outside turbo's
        # package graph; run its zero-dep node:test suite here so it gates
        # ci-success.
        run: node --test .github/scripts/aggregate-verdict.test.mjs

  # ===========================================================================
  # Verify — the full quality gate (CLAUDE.md § Quality Gates)
  # ===========================================================================
  verify:
    name: Verify (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    env:
      # CI=true makes the DB constraint suite HARD-FAIL if Docker is missing
      # (T-3.3 fix) instead of skipping. On ubuntu-latest the Docker daemon is
      # available natively, so testcontainers spins up postgres:17 for real.
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from package.json "packageManager" (pinned).

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Major-only: setup-node resolves latest 22.x; engines (>=22.9)
          # enforces the floor at install time.
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint (root configs + all packages)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (incl. DB constraint suite on live Postgres)
        run: pnpm test

      - name: Build
        run: pnpm build

  # ===========================================================================
  # Required status check — single job for future branch protection
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [guard, verify]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.guard.result }}" != "success" ]] || \
             [[ "${{ needs.verify.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed."
